<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alex's awesome music player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="player">
        <h1>Alex's awesome music player</h1>
        <p id="song-title">Young Girl A</p>
        <audio id="audio">
            <source src="song1.mp3" type="audio/mpeg">
            <source src="song0.mp3" type="audio/mpeg">
            <source src="song2.mp3" type="audio/mpeg">
            <source src="song3.mp3" type="audio/mpeg">
            <source src="song4.mp3" type="audio/mpeg">
            <source src="song5.mp3" type="audio/mpeg">        
        </audio>
        <button id="previous">Previous</button>
        <button id="play-pause">Play</button>
        <button id="next">Next</button>
        <input type="range" id="progress" value="0" min="0" step="1">

        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>
    <script src="script.js"></script>
</body>
</html>
